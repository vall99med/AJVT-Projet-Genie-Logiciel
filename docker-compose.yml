services:

  postgres:
    image: postgres:16-alpine
    container_name: ajvt_postgres
    environment:
      POSTGRES_DB: ajvt_db
      POSTGRES_USER: ajvt_user
      POSTGRES_PASSWORD: ajvt_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ajvt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajvt_user -d ajvt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ajvt_redis
    networks:
      - ajvt_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ajvt_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ajvt_network

networks:
  ajvt_network:
    driver: bridge

volumes:
  postgres_data:
  media_data:
